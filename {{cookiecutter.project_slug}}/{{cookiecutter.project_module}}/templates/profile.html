{% raw %}{% extends "base.html" %}
{% block title %}Profile — {{ project_name }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 col-lg-6 mx-auto">
        <h2 class="mb-4">My profile</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Display name</label>
                <input type="text" name="display_name" class="form-control" value="{{ current_user.display_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
            </div>
            <hr>
            <p class="text-muted">Change password (optional):</p>
            <div class="mb-3">
                <label class="form-label">New password</label>
                <input type="password" name="password" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm new password</label>
                <input type="password" name="password2" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </form>
    </div>
</div>
{% endblock %}
{% endraw %}
