{% raw %}{% extends "base.html" %}
{% block title %}Complete registration — {{ project_name }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 col-lg-4 mx-auto">
        <h2 class="mb-4">Welcome!</h2>
        <p>Set up your account for <strong>{{ user.email }}</strong>.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Display name</label>
                <input type="text" name="display_name" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required minlength="8">
                <small class="form-text text-muted">At least 8 characters, with upper, lower, and a number.</small>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm password</label>
                <input type="password" name="password2" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Create account</button>
        </form>
    </div>
</div>
{% endblock %}
{% endraw %}
